# git-cliff 配置：按 conventional commit 前缀分类生成 release notes 主体。
# Docker / 二进制 / 构建信息表由 release.yml 内的 bash 拼接后追加。

[changelog]
header = ""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}

{% for commit in commits -%}
- {{ commit.message | split(pat="\\n") | first | trim }} (`{{ commit.id | truncate(length=7, end="") }}`){% if commit.breaking %} **[BREAKING]**{% endif %}
{% endfor %}
{% endfor %}
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"
topo_order = false
sort_commits = "newest"

commit_parsers = [
    { message = "^feat",     group = "✨ 新功能" },
    { message = "^fix",      group = "🐛 修复" },
    { message = "^perf",     group = "⚡ 性能" },
    { message = "^refactor", group = "♻️ 重构" },
    { message = "^docs",     group = "📝 文档" },
    { message = "^test",     group = "✅ 测试" },
    { message = "^style",    group = "🎨 样式" },
    { message = "^build",    group = "📦 构建" },
    { message = "^ci",       group = "🔧 CI" },
    { message = "^chore",    group = "🔧 杂项" },
    { message = "^revert",   group = "⏪ 回滚" },
    { message = "^Merge",    skip = true },
    { message = ".*",        group = "📦 其他变更" },
]
