services:
  account-vault:
    image: ${IMAGE:-ghcr.io/lemonzuo/account-vault:latest}
    container_name: account-vault
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:${SERVER_PORT:-8080}"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      GIN_MODE: ${GIN_MODE:-release}
      SERVER_PORT: ${SERVER_PORT:-8080}
    volumes:
      - ./.env:/app/.env:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:${SERVER_PORT:-8080}/healthz || exit 1"]
      interval: 5m
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 5s

  tinyauth:
    image: ghcr.io/steveiliop56/tinyauth:latest
    container_name: tinyauth
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # 部署前改这些占位值,SECRET 需 32 字节随机串
      SECRET: CHANGEME-32-byte-random-string
      # 生成 USERS:  docker run --rm httpd:alpine htpasswd -nbB admin '你的密码'
      # 把输出原样填进来,并把每个 $ 改成 $$(compose 转义)
      USERS: admin:$$2y$$10$$CHANGEME-bcrypt-hash
      APP_URL: http://localhost:3000
    volumes:
      - ./data/tinyauth:/data
