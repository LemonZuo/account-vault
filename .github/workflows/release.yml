name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '20'

jobs:
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1
          if-no-files-found: error

  meta:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      commit: ${{ steps.ver.outputs.commit }}
      build_id: ${{ steps.ver.outputs.build_id }}
    steps:
      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi
          echo "commit=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          build_id=$(echo "${GITHUB_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-$(date -u +%Y%m%dT%H%M%SZ)" | sha256sum | cut -c1-12)
          echo "build_id=${build_id}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.arch }}
    needs: [frontend, meta]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Build
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          VERSION: ${{ needs.meta.outputs.version }}
          COMMIT: ${{ needs.meta.outputs.commit }}
          BUILD_ID: ${{ needs.meta.outputs.build_id }}
        run: |
          mkdir -p dist
          PKG=github.com/LemonZuo/account-vault/internal/buildinfo
          go build \
            -trimpath \
            -ldflags="-s -w -X ${PKG}.Version=${VERSION} -X ${PKG}.Commit=${COMMIT} -X ${PKG}.BuildID=${BUILD_ID}" \
            -o "dist/server-linux-${GOARCH}" .
          ls -la dist

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: server-linux-${{ matrix.arch }}
          path: dist/server-linux-${{ matrix.arch }}
          retention-days: 7
          if-no-files-found: error

  checksums:
    name: Checksums
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: server-linux-*
          path: dist
          merge-multiple: true

      - name: Compute sha256sums
        working-directory: dist
        run: |
          sha256sum server-linux-* | tee sha256sums.txt
          ls -la

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist
          retention-days: 7
          if-no-files-found: error

  docker:
    name: Build & Push Docker Images
    needs: checksums
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist

      - name: Compose image list
        id: imgs
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          REPO: ${{ github.repository }}
        run: |
          repo_lc="${REPO,,}"
          name_lc="${repo_lc##*/}"
          {
            echo "list<<EOF"
            echo "ghcr.io/${repo_lc}"
            if [ -n "${DH_USER}" ]; then
              echo "${DH_USER}/${name_lc}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          if [ -n "${DH_USER}" ]; then
            echo "has_dh=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_dh=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: steps.imgs.outputs.has_dh == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.imgs.outputs.list }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=dev-{{sha}},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build & push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

  release:
    name: Publish GitHub Release
    needs: [checksums, docker, meta]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist

      - name: Generate changelog (git-cliff)
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG_LATEST.md

      - name: Compose release notes
        env:
          VERSION: ${{ needs.meta.outputs.version }}
          COMMIT: ${{ needs.meta.outputs.commit }}
          BUILD_ID: ${{ needs.meta.outputs.build_id }}
          REPO: ${{ github.repository }}
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          set -euo pipefail

          repo_lc="${REPO,,}"
          name_lc="${repo_lc##*/}"
          ghcr_image="ghcr.io/${repo_lc}"
          dh_image=""
          if [ -n "${DH_USER:-}" ]; then
            dh_image="${DH_USER}/${name_lc}"
          fi

          prev_tag=$(git describe --tags --abbrev=0 --exclude="${VERSION}" 2>/dev/null || true)
          if [ -n "${prev_tag}" ]; then
            compare_url="https://github.com/${REPO}/compare/${prev_tag}...${VERSION}"
          else
            compare_url="https://github.com/${REPO}/commits/${VERSION}"
          fi

          amd64_sum=""
          arm64_sum=""
          if [ -f dist/sha256sums.txt ]; then
            amd64_sum=$(awk '/server-linux-amd64$/ {print $1}' dist/sha256sums.txt || true)
            arm64_sum=$(awk '/server-linux-arm64$/ {print $1}' dist/sha256sums.txt || true)
          fi

          amd64_size=""
          arm64_size=""
          if [ -f dist/server-linux-amd64 ]; then
            amd64_size=$(du -h dist/server-linux-amd64 | awk '{print $1}')
          fi
          if [ -f dist/server-linux-arm64 ]; then
            arm64_size=$(du -h dist/server-linux-arm64 | awk '{print $1}')
          fi

          {
            echo "## account-vault ${VERSION} 🛡️"
            echo
            if [ -n "${prev_tag}" ]; then
              echo "自 \`${prev_tag}\` 起的变更："
            else
              echo "首个发布版本："
            fi
            echo

            if [ -s CHANGELOG_LATEST.md ]; then
              cat CHANGELOG_LATEST.md
            else
              echo "_本次发布无可分类的 conventional commits。_"
            fi
            echo

            echo "### 🐳 Docker"
            echo
            echo '```sh'
            echo "docker pull ${ghcr_image}:${VERSION}"
            echo "docker pull ${ghcr_image}:latest"
            if [ -n "${dh_image}" ]; then
              echo "docker pull ${dh_image}:${VERSION}"
              echo "docker pull ${dh_image}:latest"
            fi
            echo '```'
            echo
            echo "镜像同时支持 \`linux/amd64\` 与 \`linux/arm64\`。"
            echo

            echo "### 🧱 二进制"
            echo
            echo "| 架构 | 文件 | 体积 | SHA256 |"
            echo "| --- | --- | --- | --- |"
            echo "| linux/amd64 | \`server‑linux‑amd64\` | ${amd64_size:-—} | \`${amd64_sum:-—}\` |"
            echo "| linux/arm64 | \`server‑linux‑arm64\` | ${arm64_size:-—} | \`${arm64_sum:-—}\` |"
            echo
            echo "校验文件：\`sha256sums.txt\`。"
            echo

            echo "### 🔍 构建信息"
            echo
            echo "| 项 | 值 |"
            echo "| --- | --- |"
            echo "| Version | \`${VERSION}\` |"
            echo "| Commit | \`${COMMIT}\` |"
            echo "| Build ID | \`${BUILD_ID}\` |"
            echo "| Go | \`${{ env.GO_VERSION }}\` |"
            echo "| Node | \`${{ env.NODE_VERSION }}\` |"
            echo
            echo "运行后可用 \`/api/version\` 验证。"
            echo

            echo "---"
            echo
            echo "**Full Changelog**: ${compare_url}"
          } > release_notes.md

          echo "preview <<<"
          cat release_notes.md
          echo ">>>"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/server-linux-amd64
            dist/server-linux-arm64
            dist/sha256sums.txt
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
