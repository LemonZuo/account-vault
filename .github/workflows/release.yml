name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: '1.25'
  NODE_VERSION: '20'

jobs:
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1
          if-no-files-found: error

  build:
    name: Build ${{ matrix.arch }}
    needs: frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi
          echo "commit=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          VERSION: ${{ steps.ver.outputs.version }}
          COMMIT: ${{ steps.ver.outputs.commit }}
        run: |
          mkdir -p dist
          PKG=github.com/LemonZuo/account-vault/internal/buildinfo
          go build \
            -trimpath \
            -ldflags="-s -w -X ${PKG}.Version=${VERSION} -X ${PKG}.Commit=${COMMIT}" \
            -o "dist/server-linux-${GOARCH}" .
          ls -la dist

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: server-linux-${{ matrix.arch }}
          path: dist/server-linux-${{ matrix.arch }}
          retention-days: 7
          if-no-files-found: error

  checksums:
    name: Checksums
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: server-linux-*
          path: dist
          merge-multiple: true

      - name: Compute sha256sums
        working-directory: dist
        run: |
          sha256sum server-linux-* | tee sha256sums.txt
          ls -la

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist
          retention-days: 7
          if-no-files-found: error

  docker:
    name: Build & Push Docker Images
    needs: checksums
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist

      - name: Compose image list
        id: imgs
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          REPO: ${{ github.repository }}
        run: |
          repo_lc="${REPO,,}"
          name_lc="${repo_lc##*/}"
          {
            echo "list<<EOF"
            echo "ghcr.io/${repo_lc}"
            if [ -n "${DH_USER}" ]; then
              echo "${DH_USER}/${name_lc}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          if [ -n "${DH_USER}" ]; then
            echo "has_dh=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_dh=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: steps.imgs.outputs.has_dh == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.imgs.outputs.list }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=dev-{{sha}},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build & push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

  release:
    name: Publish GitHub Release
    needs: [checksums, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/server-linux-amd64
            dist/server-linux-arm64
            dist/sha256sums.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
